<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oréal Beauty Advisor</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <header class="site-header">
        <img
          src="loreal-logo.png"
          alt="L'Oréal Paris logo"
          class="site-logo"
        />
        <h1 class="site-title">Beauty Advisor</h1>
        <p class="site-subtitle">
          Your personal guide to L'Oréal products &amp; routines
        </p>
      </header>

      <main>
        <section class="chatbox">
          <div
            id="latestQuestion"
            class="latest-question"
            aria-live="polite"
          ></div>

          <div id="chatWindow" class="chat-window"></div>

          <div
            id="quickActions"
            class="quick-actions"
            aria-label="Quick prompts"
          >
            <button
              type="button"
              class="quick-action-btn"
              data-prompt="Build a simple morning skincare routine for combination skin."
            >
              Morning routine
            </button>
            <button
              type="button"
              class="quick-action-btn"
              data-prompt="Recommend a L'Oréal foundation for natural everyday makeup."
            >
              Foundation help
            </button>
            <button
              type="button"
              class="quick-action-btn"
              data-prompt="Suggest a haircare routine for dry and frizzy hair."
            >
              Haircare plan
            </button>
          </div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask me about products or routines…"
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <footer class="site-footer">
        <p>&copy; 2025 L'Oréal Paris. All rights reserved.</p>
        <nav>
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Use</a>
          <a href="#">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
